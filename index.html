<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دارالعلوم اسلامیہ عربیہ تلوجہ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a5c2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="تلوجہ">
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--green:#1a5c2e;--gl:#2d8a47;--gp:#e8f5ec;--gold:#c8952a;--dark:#0f1f13;--white:#fefefe;--gray:#f2f5f2;--border:#c5ddc9;--red:#b52a2a;--blue:#1a3e6b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Nastaliq Urdu',serif;background:var(--gray);color:var(--dark);min-height:100vh;direction:rtl;}
#loadingPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--dark) 0%,var(--green) 60%,var(--gold) 100%);}
.loading-box{text-align:center;color:white;}
.loading-logo{font-size:60px;margin-bottom:16px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.loading-text{font-size:18px;font-weight:700;}.loading-sub{font-size:13px;opacity:.7;margin-top:6px;}
#loginPage{min-height:100vh;display:none;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--dark) 0%,var(--green) 60%,var(--gold) 100%);position:relative;overflow:hidden;}
#loginPage::before{content:'☪';position:absolute;font-size:400px;opacity:0.04;color:white;top:-80px;left:-80px;}
.login-box{background:rgba(255,255,255,0.97);border-radius:20px;padding:44px 36px;width:400px;max-width:95vw;box-shadow:0 30px 80px rgba(0,0,0,0.35);text-align:center;position:relative;z-index:1;}
.login-logo{width:68px;height:68px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:30px;}
.login-title{font-size:20px;font-weight:700;color:var(--green);margin-bottom:3px;}
.login-sub{font-size:12px;color:#888;margin-bottom:22px;font-family:'Amiri',serif;}
.login-box input{width:100%;padding:12px 15px;border:2px solid var(--border);border-radius:10px;font-family:'Noto Nastaliq Urdu',serif;font-size:14px;margin-bottom:12px;outline:none;transition:border .2s;text-align:right;direction:rtl;}
.login-box input:focus{border-color:var(--green);}
.login-box button{width:100%;padding:13px;background:var(--green);color:white;border:none;border-radius:10px;font-family:'Noto Nastaliq Urdu',serif;font-size:16px;font-weight:700;cursor:pointer;}
.login-err{color:var(--red);font-size:13px;margin-top:8px;display:none;}
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ccc;margin-left:4px;}
.sync-dot.online{background:#1a8c3a;}.sync-dot.syncing{background:#c8952a;animation:pulse 1s infinite;}
#app{display:none;}
.topbar{background:var(--green);color:white;padding:0 16px;height:58px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.2);position:sticky;top:0;z-index:100;}
.topbar-title{font-size:16px;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:8px;font-size:12px;}
.logout-btn{background:rgba(255,255,255,.18);border:none;color:white;padding:5px 10px;border-radius:7px;cursor:pointer;font-family:'Noto Nastaliq Urdu',serif;font-size:12px;}
.main{max-width:1100px;margin:0 auto;padding:16px;}
.tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.tab-btn{padding:8px 16px;border-radius:10px;border:2px solid var(--border);background:white;font-family:'Noto Nastaliq Urdu',serif;font-size:13px;cursor:pointer;font-weight:600;transition:all .2s;}
.tab-btn.active{background:var(--green);color:white;border-color:var(--green);}
.card{background:white;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid var(--border);}
.card-title{font-size:15px;font-weight:700;color:var(--green);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--gp);}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.fg{flex:1;min-width:150px;}
.fg label{display:block;font-size:12px;color:#555;margin-bottom:4px;font-weight:600;}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:2px solid var(--border);border-radius:8px;font-family:'Noto Nastaliq Urdu',serif;font-size:13px;outline:none;transition:border .2s;background:white;color:var(--dark);direction:rtl;}
.fg input:focus,.fg select:focus{border-color:var(--green);}
.btn{padding:8px 18px;border-radius:8px;border:none;font-family:'Noto Nastaliq Urdu',serif;font-size:13px;cursor:pointer;font-weight:700;transition:all .2s;}
.btn-green{background:var(--green);color:white;}.btn-gold{background:var(--gold);color:white;}
.btn-red{background:var(--red);color:white;}.btn-blue{background:var(--blue);color:white;}
.btn-sm{padding:5px 12px;font-size:12px;}.btn-xs{padding:3px 8px;font-size:11px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:var(--green);color:white;}
thead th{padding:9px 10px;text-align:right;font-weight:600;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:hover{background:var(--gp);}
tbody td{padding:8px 10px;text-align:right;vertical-align:middle;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.bg{background:#d4edda;color:#1a5c2e;}.bb{background:#d0e4f7;color:#1a3e6b;}.br{background:#fde0e0;color:#b52a2a;}.bo{background:#fef3d0;color:#8a5f00;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.stat-box{background:white;border-radius:12px;padding:14px;border:1px solid var(--border);text-align:center;}
.stat-num{font-size:28px;font-weight:700;color:var(--green);font-family:'Amiri',serif;}
.stat-label{font-size:11px;color:#777;margin-top:3px;}
.namaz-header{background:var(--green);color:white;text-align:center;padding:12px;border-radius:10px 10px 0 0;font-size:15px;font-weight:700;}
.namaz-subheader{background:#e8f5ec;padding:8px 14px;display:flex;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.namaz-subheader span{font-size:12px;color:#333;}
.namaz-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:0 0 10px 10px;}
.namaz-table{border-collapse:collapse;font-size:11px;min-width:900px;}
.namaz-table th,.namaz-table td{border:1px solid #d0e0d0;padding:5px 6px;text-align:center;white-space:nowrap;}
.namaz-table thead tr th{background:var(--green);color:white;}
.namaz-table tbody .row-label{background:#f0f8f0;font-weight:700;text-align:right;padding:5px 8px;}
.namaz-table tbody .sub-label{background:#f7fbf7;font-size:11px;color:#555;text-align:right;padding:4px 8px;}
.namaz-table .group-header{background:#c8dece;font-weight:700;color:var(--green);}
.check-cell{cursor:pointer;font-size:15px;}.check-cell:hover{transform:scale(1.3);}
.c-yes{color:#1a8c3a;}.c-no{color:#cc2222;}.c-empty{color:#ccc;}
.section-head{font-size:13px;font-weight:700;color:var(--blue);margin:14px 0 8px;padding:6px 10px;background:#eef4ff;border-radius:7px;border-right:4px solid var(--blue);}
.class-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
.class-card{background:white;border-radius:12px;padding:14px;border:2px solid var(--border);position:relative;}
.class-card:hover{border-color:var(--green);}
.cc-name{font-size:14px;font-weight:700;color:var(--green);margin-bottom:3px;}
.cc-info{font-size:11px;color:#888;}
.cc-del{position:absolute;top:6px;left:6px;background:#fde0e0;border:none;border-radius:5px;width:22px;height:22px;cursor:pointer;color:var(--red);font-size:12px;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:white;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.2);z-index:999;display:none;}
.empty{text-align:center;padding:30px;color:#aaa;font-size:13px;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.ov.open{display:flex;}
.modal{background:white;border-radius:16px;padding:24px;width:520px;max-width:95vw;box-shadow:0 30px 80px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto;}
.wa-btn{background:#25d366;color:white;border:none;padding:9px 20px;border-radius:9px;font-family:'Noto Nastaliq Urdu',serif;font-size:13px;cursor:pointer;font-weight:700;}
.wa-tpl{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:10px;padding:12px;font-size:12px;line-height:2;color:#1b5e20;margin:8px 0;white-space:pre-line;}
.import-zone{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-bottom:12px;transition:border .2s;}
.import-zone:hover{border-color:var(--green);}
.import-zone input{display:none;}
@media print{
  .topbar,.tabs,.btn,.card-title button{display:none!important;}
  .card{box-shadow:none;border:none;}
  body{background:white;}
}
</style>
</head>
<body>

<div id="loadingPage">
  <div class="loading-box">
    <div class="loading-logo">🕌</div>
    <div class="loading-text">دارالعلوم تلوجہ</div>
    <div class="loading-sub">لوڈ ہو رہا ہے...</div>
  </div>
</div>

<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">🕌</div>
    <div class="login-title">دارالعلوم اسلامیہ عربیہ تلوجہ</div>
    <div class="login-sub">Darul Uloom Islamia Arabia Taloja</div>
    <input type="text" id="lid" placeholder="آئی ڈی درج کریں" />
    <input type="password" id="lpass" placeholder="پاس ورڈ درج کریں" onkeydown="if(event.key==='Enter')doLogin()" />
    <button onclick="doLogin()">داخل ہوں ←</button>
    <div class="login-err" id="lerr">آئی ڈی یا پاس ورڈ غلط ہے</div>
    <div style="font-size:11px;color:#888;margin-top:8px;"><span class="sync-dot online" id="syncDot"></span> Firebase منسلک</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-title">🕌 دارالعلوم تلوجہ</div>
    <div class="topbar-right">
      <span class="sync-dot online" id="appSyncDot"></span>
      <span id="uLabel"></span>
      <button class="logout-btn" onclick="doLogout()">خروج</button>
    </div>
  </div>
  <div class="main">
    <div class="tabs" id="tabsBar"></div>

    <!-- DASHBOARD -->
    <div id="tab-dashboard" style="display:none">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="card"><div class="card-title">📋 حالیہ سرگرمی</div><div id="recentLog"></div></div>
    </div>

    <!-- CLASSES -->
    <div id="tab-classes" style="display:none">
      <div class="card">
        <div class="card-title">➕ نئی کلاس شامل کریں</div>
        <div class="form-row">
          <div class="fg"><label>کیٹیگری</label>
            <select id="ncCat"><option value="حفظ">حفظ</option><option value="دینیات">دینیات</option><option value="عالمیت">عالمیت</option></select></div>
          <div class="fg"><label>درجہ کا نام</label><input id="ncName" placeholder="مثلاً: اول الف" /></div>
          <div class="fg"><label>استاد کا نام</label><input id="ncTeacher" placeholder="استاد کا نام" /></div>
        </div>
        <div class="form-row">
          <div class="fg"><label>لاگ ان آئی ڈی</label><input id="ncId" placeholder="مثلاً: hifz1a" /></div>
          <div class="fg"><label>پاس ورڈ</label><input id="ncPass" placeholder="پاس ورڈ" /></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-green" onclick="addClass()">➕ شامل کریں</button>
          <button class="btn btn-blue" onclick="document.getElementById('clsImportFile').click()">📥 Excel سے Import</button>
          <input type="file" id="clsImportFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="importClasses(this)">
          <button class="btn btn-gold" onclick="exportClassesExcel()">📤 Excel Export</button>
          <button class="btn btn-gold" onclick="downloadClassTemplate()">📋 Template Download</button>
        </div>
      </div>
      <div id="classesDisplay"></div>
    </div>

    <!-- STUDENTS -->
    <div id="tab-students" style="display:none">
      <div class="card">
        <div class="card-title">➕ نیا طالب علم شامل کریں</div>
        <div class="form-row">
          <div class="fg"><label>کیٹیگری</label>
            <select id="sCat" onchange="fillClassDrop('sCls','sCat')">
              <option value="حفظ">حفظ</option><option value="دینیات">دینیات</option><option value="عالمیت">عالمیت</option>
            </select></div>
          <div class="fg"><label>درجہ</label><select id="sCls"></select></div>
        </div>
        <div class="form-row">
          <div class="fg"><label>نام (مثلاً: محمد زید بن محمد اسلم)</label><input id="sName" placeholder="محمد زید بن محمد اسلم" /></div>
          <div class="fg"><label>واٹس ایپ نمبر</label><input id="sPhone" placeholder="923001234567" /></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-green" onclick="addStudent()">➕ شامل کریں</button>
          <button class="btn btn-blue" onclick="document.getElementById('stuImportFile').click()">📥 Excel سے Import</button>
          <input type="file" id="stuImportFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="importStudents(this)">
          <button class="btn btn-gold" onclick="exportStudentsExcel()">📤 Excel Export</button>
          <button class="btn btn-gold" onclick="downloadStudentTemplate()">📋 Template Download</button>
        </div>
      </div>
      <div class="card" style="padding:12px 16px">
        <div class="form-row" style="margin:0;align-items:flex-end">
          <div class="fg"><label>کیٹیگری</label>
            <select id="fCat" onchange="renderStudents()"><option value="">سب</option>
              <option value="حفظ">حفظ</option><option value="دینیات">دینیات</option><option value="عالمیت">عالمیت</option></select></div>
          <div class="fg"><label>درجہ</label><select id="fCls" onchange="renderStudents()"><option value="">سب</option></select></div>
          <div class="fg"><label>تلاش</label><input id="fSearch" placeholder="نام تلاش..." oninput="renderStudents()" /></div>
        </div>
      </div>
      <div class="card"><div class="card-title">👨‍🎓 طلبہ</div><div id="studTable"></div></div>
    </div>

    <!-- ACCOUNTS -->
    <div id="tab-accounts" style="display:none">
      <div class="card"><div class="card-title">🔑 اکاؤنٹس</div><div id="accTable"></div></div>
    </div>

    <!-- WHATSAPP -->
    <div id="tab-whatsapp" style="display:none">
      <div class="card">
        <div class="card-title">📱 واٹس ایپ ریمائنڈر</div>
        <div class="form-row">
          <div class="fg"><label>کیٹیگری</label>
            <select id="wCat" onchange="fillClassDrop('wCls','wCat',true)">
              <option value="">سب</option><option value="حفظ">حفظ</option><option value="دینیات">دینیات</option><option value="عالمیت">عالمیت</option></select></div>
          <div class="fg"><label>درجہ</label><select id="wCls"><option value="">سب</option></select></div>
        </div>
        <div class="fg" style="margin-bottom:12px"><label>میسج</label>
          <textarea id="wMsg" rows="4">السلام علیکم! {نام} کی نمازوں کی ہفتہ وار رپورٹ ملاحظہ فرمائیں۔ جزاکم اللہ خیرا — دارالعلوم تلوجہ</textarea></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-green" onclick="previewWa()">👁️ پیش نظارہ</button>
          <button class="btn btn-gold" onclick="exportWaCsv()">📥 CSV</button>
        </div>
      </div>
      <div class="card" id="waPreview" style="display:none">
        <div class="card-title">📤 پیش نظارہ</div><div id="waList"></div>
      </div>
    </div>

    <!-- ATTENDANCE -->
    <div id="tab-attendance" style="display:none">
      <div class="card">
        <div class="card-title">📅 نماز حاضری</div>
        <div class="form-row">
          <div class="fg"><label>طالب علم</label><select id="attStu" onchange="loadAttendance()"><option value="">— منتخب کریں —</option></select></div>
          <div class="fg"><label>مہینہ</label><select id="attMonth" onchange="loadAttendance()"></select></div>
          <div class="fg"><label>سال</label><select id="attYear" onchange="loadAttendance()"></select></div>
        </div>
        <button class="btn btn-gold btn-sm" onclick="exportAttPDF()">📄 PDF Export</button>
      </div>
      <div id="attChart"></div>
    </div>

    <!-- MY STUDENTS -->
    <div id="tab-mystudents" style="display:none">
      <div class="card">
        <div class="card-title">👨‍🎓 میرے طلبہ</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
          <button class="btn btn-gold btn-sm" onclick="exportMyStudentsPDF()">📄 PDF Export</button>
          <button class="btn btn-green btn-sm" onclick="exportMyStudentsExcel()">📤 Excel Export</button>
        </div>
        <div id="myStudTable"></div>
      </div>
    </div>

  </div>
</div>

<div class="ov" id="ov"><div class="modal" id="modalBox">
  <div style="font-size:16px;font-weight:700;color:var(--green);margin-bottom:16px" id="mTitle"></div>
  <div id="mBody"></div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
    <button class="btn btn-red btn-sm" onclick="closeModal()">بند کریں</button>
  </div>
</div></div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyACb1-QPGeaIETVb2O_e60fLqrnd9S2eKs",
  authDomain: "darululoom-taluha.firebaseapp.com",
  projectId: "darululoom-taluha",
  storageBucket: "darululoom-taluha.firebasestorage.app",
  messagingSenderId: "768514834771",
  appId: "1:768514834771:web:f92277e297c145fc07e1a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const DEFAULT_DB = {
  accounts:[
    {id:'darululoom',pass:'Zaid@1234',name:'ایڈمن',role:'admin',classId:''},
    {id:'info@darululoomtaloja.com',pass:'Waba@1234',name:'آفیشل اکاؤنٹ',role:'admin',classId:''}
  ],
  classes:[],students:[],attendance:{},log:[]
};

let DB = JSON.parse(JSON.stringify(DEFAULT_DB));
let CU = null;

function setSyncDot(s){['syncDot','appSyncDot'].forEach(id=>{const el=document.getElementById(id);if(el)el.className='sync-dot '+s;});}

async function loadFromFirebase(){
  try{
    const snap=await getDoc(doc(db,'darululoom','main'));
    if(snap.exists()){DB=snap.data();if(!DB.attendance)DB.attendance={};}
    else{await setDoc(doc(db,'darululoom','main'),DEFAULT_DB);}
    setSyncDot('online');
  }catch(e){
    const local=localStorage.getItem('du_db3');
    if(local)DB=JSON.parse(local);
    setSyncDot('offline');
  }
}

async function saveToFirebase(){
  setSyncDot('syncing');
  try{
    await setDoc(doc(db,'darululoom','main'),DB);
    localStorage.setItem('du_db3',JSON.stringify(DB));
    setSyncDot('online');
  }catch(e){
    localStorage.setItem('du_db3',JSON.stringify(DB));
    setSyncDot('offline');
    toast('آف لائن — مقامی محفوظ','red');
  }
}

function startRealtime(){
  onSnapshot(doc(db,'darululoom','main'),(snap)=>{
    if(snap.exists()&&CU){DB=snap.data();if(!DB.attendance)DB.attendance={};setSyncDot('online');const ab=document.querySelector('.tab-btn.active');if(ab)ab.click();}
  },()=>setSyncDot('offline'));
}

async function save(){localStorage.setItem('du_db3',JSON.stringify(DB));await saveToFirebase();}

function logAct(msg){if(!DB.log)DB.log=[];DB.log.push({t:new Date().toLocaleString('ur-PK'),m:msg});if(DB.log.length>60)DB.log=DB.log.slice(-60);}

function toast(m,c='green'){const t=document.getElementById('toast');t.textContent=m;t.style.background=c==='red'?'#b52a2a':'#1a5c2e';t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2800);}

// LOGIN
window.doLogin=function(){
  const id=document.getElementById('lid').value.trim();
  const pass=document.getElementById('lpass').value;
  const acc=DB.accounts.find(a=>a.id===id&&a.pass===pass);
  if(!acc){document.getElementById('lerr').style.display='block';return;}

function buildTabs(){
  const bar=document.getElementById('tabsBar');
  const tabs=CU.role==='admin'
    ?[{id:'dashboard',label:'📊 ڈیش بورڈ'},{id:'classes',label:'🏫 درجات'},{id:'students',label:'👨‍🎓 طلبہ'},{id:'accounts',label:'🔑 اکاؤنٹس'},{id:'whatsapp',label:'📱 واٹس ایپ'}]
    :[{id:'mystudents',label:'👨‍🎓 میرے طلبہ'},{id:'attendance',label:'🕌 نماز حاضری'}];
  bar.innerHTML=tabs.map((t,i)=>`<button class="tab-btn${i===0?' active':''}" onclick="showTab('${t.id}',this)">${t.label}</button>`).join('');
  showTab(tabs[0].id,bar.firstChild);

window.showTab=function(name,btn){
  document.querySelectorAll('[id^="tab-"]').forEach(el=>el.style.display='none');
  const el=document.getElementById('tab-'+name);if(el)el.style.display='block';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(name==='dashboard')renderDashboard();
  if(name==='classes')renderClasses();
  if(name==='students'){fillClassDrop('sCls','sCat');renderStudents();}
  if(name==='accounts')renderAccounts();
  if(name==='attendance')initAttendance();
  if(name==='mystudents')renderMyStudents();
};

window.importClasses=async function(input){
  const file=input.files[0];if(!file)return;

  const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
  let added=0;
  for(const r of rows){
    const cat=String(r['کیٹیگری']||r['cat']||'').trim();
    const name=String(r['درجہ نام']||r['name']||'').trim();
    const teacher=String(r['استاد']||r['teacher']||'').trim();
    const cid=String(r['آئی ڈی']||r['id']||'').trim();
    const cpass=String(r['پاسورڈ']||r['pass']||'').trim();
    if(!name||!cid||!cpass)continue;
    if(DB.classes.find(c=>c.cat===cat&&c.name===name))continue;
    if(DB.accounts.find(a=>a.id===cid))continue;
    const id='cls_'+Date.now()+'_'+added;
    DB.classes.push({id,cat,name,teacher});
    DB.accounts.push({id:cid,pass:cpass,name:teacher||name,role:'teacher',classId:id});

};

window.exportStudentPDF=function(stuId){
  const stu=DB.students.find(s=>s.id===stuId);if(!stu)return;
  const w=window.open('','_blank');
  const att=DB.attendance||{};
  // get all attendance for this student
  const keys=Object.keys(att).filter(k=>k.startsWith(stuId));
  const MONTHS=['محرم','صفر','ربیع الاول','ربیع الثانی','جمادی الاول','جمادی الثانی','رجب','شعبان','رمضان','شوال','ذیقعدہ','ذیالحجہ',
    'جنوری','فروری','مارچ','اپریل','مئی','جون','جولائی','اگست','ستمبر','اکتوبر','نومبر','دسمبر'];
  let attHtml='<p style="color:#888;font-size:12px">حاضری کا کوئی ریکارڈ نہیں</p>';
  if(keys.length){
    attHtml=keys.map(k=>{
      const parts=k.split('_');const year=parts[1];const month=parts[2];
      const rec=att[k];
      const total=NAMAZ_ROWS.length*31;
      let yes=0;Object.values(rec).forEach(r=>Object.values(r).forEach(v=>{if(v===true)yes++;}));
      return`<div style="margin-bottom:8px;padding:8px;background:#f0f8f0;border-radius:6px;font-size:13px">
        <b>${MONTHS[month]} ${year}</b> — ✅ ${yes} نمازیں پڑھیں</div>`;
    }).join('');
  }
  w.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Noto Nastaliq Urdu',serif;padding:30px;direction:rtl;max-width:600px;margin:auto;}
    h2{color:#1a5c2e;border-bottom:2px solid #1a5c2e;padding-bottom:8px;}
    .info{margin:8px 0;font-size:14px;} .label{color:#888;font-size:12px;}
    @media print{button{display:none}}</style></head><body>
    <h2>🕌 دارالعلوم اسلامیہ عربیہ تلوجہ</h2>
    <h3 style="color:#c8952a">طالب علم کارڈ</h3>
    <div class="info"><span class="label">نام:</span> <b>${stu.name}</b></div>
    <div class="info"><span class="label">کیٹیگری:</span> ${stu.cat}</div>
    <div class="info"><span class="label">درجہ:</span> ${stu.className||'—'}</div>
    <div class="info"><span class="label">واٹس ایپ:</span> ${stu.phone||'—'}</div>
    <h3 style="margin-top:20px;color:#1a5c2e">نماز حاضری خلاصہ</h3>
    ${attHtml}
    <div style="margin-top:30px;display:flex;justify-content:space-between;font-size:12px;color:#888">
      <span>دستخط استاذ: ....................</span>
      <span>دستخط سرپرست: ....................</span>
    </div>
    <button onclick="window.print()" style="margin-top:20px;padding:10px 20px;background:#1a5c2e;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px">🖨️ Print / PDF</button>
    </body></html>`);
  w.document.close();
};

  'جنوری','فروری','مارچ','اپریل','مئی','جون','جولائی','اگست','ستمبر','اکتوبر','نومبر','دسمبر'];

function initAttendance(){
  const stus=CU.classId?DB.students.filter(s=>s.classId===CU.classId):DB.students;
  const sel=document.getElementById('attStu');
  sel.innerHTML='<option value="">— منتخب کریں —</option>'+stus.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  const mSel=document.getElementById('attMonth');
  mSel.innerHTML=MONTHS.map((m,i)=>`<option value="${i}">${m}</option>`).join('');
  mSel.value=new Date().getMonth()+12;
  const yr=new Date().getFullYear();
  document.getElementById('attYear').innerHTML=[yr-1,yr,yr+1].map(y=>`<option value="${y}"${y===yr?' selected':''}>${y}</option>`).join('');
  document.getElementById('attChart').innerHTML='';
}

window.loadAttendance=function(){
  const stuId=document.getElementById('attStu').value;
  if(!stuId){document.getElementById('attChart').innerHTML='';return;}
  const stu=DB.students.find(s=>s.id===stuId);if(!stu)return;
  const month=document.getElementById('attMonth').value,year=document.getElementById('attYear').value;
  const key=`${stuId}_${year}_${month}`;
  if(!DB.attendance)DB.attendance={};
  const att=DB.attendance[key]||{};
  const days=Array.from({length:31},(_,i)=>i+1);
  let th=`<th style="min-width:110px">نماز</th>`+days.map(d=>`<th>${d}</th>`).join('');
  let rows='';let lastGroup='';
  NAMAZ_ROWS.forEach(row=>{
    if(row.group&&row.group!==lastGroup){rows+=`<tr><td class="group-header" colspan="${days.length+1}">${row.group}</td></tr>`;lastGroup=row.group;}
    else if(!row.group){lastGroup='';}
    let cells=days.map(d=>{const val=att[row.key]?att[row.key][d]:undefined;
      const sym=val===true?'✅':val===false?'❌':'◯';const cls=val===true?'c-yes':val===false?'c-no':'c-empty';
      return`<td><span class="check-cell ${cls}" onclick="toggleAtt('${key}','${row.key}',${d})">${sym}</span></td>`;}).join('');
    rows+=`<tr><td class="${row.group?'sub-label':'row-label'}">${row.label}</td>${cells}</tr>`;
  });
  document.getElementById('attChart').innerHTML=`
    <div class="namaz-header">نماز حاضری — ${stu.name} — ${MONTHS[month]} ${year}</div>
    <div class="namaz-subheader"><span>درجہ: <b>${stu.className||stu.cat}</b></span>
      <span>✅پڑھی ❌نہیں پڑھی ◯درج نہیں</span>
      <span><button class="btn btn-green btn-sm" onclick="saveAtt('${key}')">💾 محفوظ</button></span></div>
    <div class="namaz-wrap"><table class="namaz-table"><thead><tr>${th}</tr></thead><tbody>${rows}</tbody></table></div>
    <div style="margin-top:8px;font-size:11px;color:#888">دستخط استاذ: ............................ &nbsp; دستخط سرپرست: ............................</div>`;
};

window.toggleAtt=async function(key,rowKey,day){
  if(!DB.attendance)DB.attendance={};if(!DB.attendance[key])DB.attendance[key]={};if(!DB.attendance[key][rowKey])DB.attendance[key][rowKey]={};
  const cur=DB.attendance[key][rowKey][day];
  DB.attendance[key][rowKey][day]=cur===undefined?true:cur===true?false:undefined;
  if(DB.attendance[key][rowKey][day]===undefined)delete DB.attendance[key][rowKey][day];
  await save();loadAttendance();
};

window.saveAtt=async function(key){await save();logAct(`حاضری محفوظ: ${key}`);toast('حاضری محفوظ ✅');};

window.goToAtt=function(stuId){
  showTab('attendance',null);
  setTimeout(()=>{document.getElementById('attStu').value=stuId;loadAttendance();
    document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.toggle('active',b.textContent.includes('نماز'));});},100);
};
