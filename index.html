<!DOCTYPE html>
<html lang="ur" dir="rtl" data-lang="ur" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darul Uloom Taloja</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a5c2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DU Taloja">
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Amiri:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ===== THEME VARIABLES ===== */
:root{
  --green:#1a5c2e;--gl:#2d8a47;--gp:#e8f5ec;
  --gold:#c8952a;--red:#b52a2a;--blue:#1a3e6b;
  --bg:#f2f5f2;--card:#ffffff;--dark:#0f1f13;
  --border:#c5ddc9;--text:#0f1f13;--subtext:#555;
  --input-bg:#ffffff;--topbar:#1a5c2e;
  --shadow:0 2px 10px rgba(0,0,0,.06);
}
[data-theme="dark"]{
  --bg:#0d1a0f;--card:#162018;--dark:#e8f5ec;
  --border:#2a4a2e;--text:#e8f5ec;--subtext:#9ab89e;
  --input-bg:#1e2f20;--topbar:#0d1a0f;--gp:#1e3022;
  --shadow:0 2px 10px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0;transition:background .2s,color .2s,border-color .2s;}
body{background:var(--bg);color:var(--text);min-height:100vh;}
[data-lang="ur"] body,[data-lang="ur"] input,[data-lang="ur"] select,[data-lang="ur"] textarea,[data-lang="ur"] button{font-family:'Noto Nastaliq Urdu',serif;}
[data-lang="en"] body,[data-lang="en"] input,[data-lang="en"] select,[data-lang="en"] textarea,[data-lang="en"] button{font-family:'Inter',sans-serif;}

/* RTL/LTR */
[data-lang="ur"]{direction:rtl;}
[data-lang="en"]{direction:ltr;}
[data-lang="en"] .fg input,[data-lang="en"] .fg select,[data-lang="en"] .fg textarea{direction:ltr;text-align:left;}
[data-lang="en"] thead th,[data-lang="en"] tbody td{text-align:left;}

/* LOADING */
#loadingPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f1f13 0%,#1a5c2e 60%,#c8952a 100%);}
.loading-box{text-align:center;color:white;}
.loading-logo{font-size:60px;margin-bottom:16px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.loading-text{font-size:18px;font-weight:700;}.loading-sub{font-size:13px;opacity:.7;margin-top:6px;}

/* LOGIN */
#loginPage{min-height:100vh;display:none;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f1f13 0%,#1a5c2e 60%,#c8952a 100%);position:relative;overflow:hidden;}
#loginPage::before{content:'☪';position:absolute;font-size:400px;opacity:0.04;color:white;top:-80px;}
[data-lang="ur"] #loginPage::before{right:-80px;}[data-lang="en"] #loginPage::before{left:-80px;}
.login-box{background:var(--card);border-radius:20px;padding:40px 32px;width:400px;max-width:95vw;box-shadow:0 30px 80px rgba(0,0,0,0.35);text-align:center;position:relative;z-index:1;}
.login-logo{width:68px;height:68px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:30px;}
.login-title{font-size:20px;font-weight:700;color:var(--green);margin-bottom:3px;}
.login-sub{font-size:12px;color:#888;margin-bottom:18px;}
.login-box input{width:100%;padding:12px 15px;border:2px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:12px;outline:none;transition:border .2s;background:var(--input-bg);color:var(--text);}
[data-lang="ur"] .login-box input{text-align:right;direction:rtl;}
[data-lang="en"] .login-box input{text-align:left;direction:ltr;}
.login-box input:focus{border-color:var(--green);}
.login-box .login-btn{width:100%;padding:13px;background:var(--green);color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;}
.login-err{color:var(--red);font-size:13px;margin-top:8px;display:none;}
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ccc;margin:0 4px;}
.sync-dot.online{background:#1a8c3a;}.sync-dot.syncing{background:#c8952a;animation:pulse 1s infinite;}.sync-dot.offline{background:#b52a2a;}

/* TOPBAR */
#app{display:none;}
.topbar{background:var(--topbar);color:white;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.3);position:sticky;top:0;z-index:100;}
.topbar-title{font-size:15px;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:6px;}
.tb-btn{background:rgba(255,255,255,.15);border:none;color:white;padding:5px 10px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;}
.tb-btn:hover{background:rgba(255,255,255,.28);}

/* TOGGLE SWITCH */
.toggle-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.8);}
.toggle{position:relative;width:34px;height:18px;}
.toggle input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;inset:0;background:#555;border-radius:18px;transition:.3s;}
.slider:before{content:'';position:absolute;width:12px;height:12px;bottom:3px;left:3px;background:white;border-radius:50%;transition:.3s;}
input:checked+.slider{background:var(--gold);}
input:checked+.slider:before{transform:translateX(16px);}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:14px;}
.tabs{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap;}
.tab-btn{padding:7px 14px;border-radius:10px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer;font-weight:600;transition:all .2s;}
.tab-btn.active{background:var(--green);color:white;border-color:var(--green);}
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border);}
.card-title{font-size:14px;font-weight:700;color:var(--green);margin-bottom:12px;padding-bottom:7px;border-bottom:2px solid var(--gp);}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.fg{flex:1;min-width:148px;}
.fg label{display:block;font-size:11px;color:var(--subtext);margin-bottom:4px;font-weight:600;}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:2px solid var(--border);border-radius:8px;font-size:13px;outline:none;transition:border .2s;background:var(--input-bg);color:var(--text);}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--green);}

/* BUTTONS */
.btn{padding:7px 16px;border-radius:8px;border:none;font-size:12px;cursor:pointer;font-weight:700;transition:all .2s;}
.btn-green{background:var(--green);color:white;}.btn-gold{background:var(--gold);color:white;}
.btn-red{background:var(--red);color:white;}.btn-blue{background:var(--blue);color:white;}
.btn-sm{padding:5px 12px;font-size:12px;}.btn-xs{padding:3px 8px;font-size:11px;}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:var(--green);color:white;}
thead th{padding:8px 10px;font-weight:600;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:hover{background:var(--gp);}
tbody td{padding:7px 10px;vertical-align:middle;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.bg{background:#d4edda;color:#1a5c2e;}.bb{background:#d0e4f7;color:#1a3e6b;}.br{background:#fde0e0;color:#b52a2a;}.bo{background:#fef3d0;color:#8a5f00;}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px;}
.stat-box{background:var(--card);border-radius:12px;padding:14px;border:1px solid var(--border);text-align:center;}
.stat-num{font-size:26px;font-weight:700;color:var(--green);}
.stat-label{font-size:11px;color:var(--subtext);margin-top:2px;}

.namaz-header{background:var(--green);color:white;text-align:center;padding:11px;border-radius:10px 10px 0 0;font-size:14px;font-weight:700;}
.namaz-subheader{background:var(--gp);padding:7px 12px;display:flex;gap:14px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.namaz-subheader span{font-size:11px;color:var(--text);}
.namaz-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:0 0 10px 10px;}
.namaz-table{border-collapse:collapse;font-size:11px;min-width:900px;}
.namaz-table th,.namaz-table td{border:1px solid var(--border);padding:4px 5px;text-align:center;white-space:nowrap;}
.namaz-table thead tr th{background:var(--green);color:white;}
.namaz-table tbody .row-label{background:var(--gp);font-weight:700;padding:4px 8px;}
.namaz-table tbody .sub-label{background:var(--card);font-size:10px;color:var(--subtext);padding:3px 8px;}
.namaz-table .group-header{background:#c8dece;font-weight:700;color:var(--green);}
[data-lang="ur"] .namaz-table .row-label,[data-lang="ur"] .namaz-table .sub-label{text-align:right;}
[data-lang="en"] .namaz-table .row-label,[data-lang="en"] .namaz-table .sub-label{text-align:left;}
.check-cell{cursor:pointer;font-size:14px;}.check-cell:hover{transform:scale(1.3);}
.c-yes{color:#1a8c3a;}.c-no{color:#cc2222;}.c-empty{color:#888;}
.section-head{font-size:13px;font-weight:700;color:var(--blue);margin:12px 0 8px;padding:6px 10px;background:var(--card);border-radius:7px;border-right:4px solid var(--blue);}
[data-lang="en"] .section-head{border-right:none;border-left:4px solid var(--blue);}
.class-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;}
.class-card{background:var(--card);border-radius:12px;padding:13px;border:2px solid var(--border);position:relative;}
.class-card:hover{border-color:var(--green);}
.cc-name{font-size:13px;font-weight:700;color:var(--green);margin-bottom:3px;}
.cc-info{font-size:11px;color:var(--subtext);}
.cc-del{position:absolute;top:6px;background:#fde0e0;border:none;border-radius:5px;width:22px;height:22px;cursor:pointer;color:var(--red);font-size:11px;}
[data-lang="ur"] .cc-del{left:6px;}[data-lang="en"] .cc-del{right:6px;}
.toast{position:fixed;bottom:18px;z-index:999;background:var(--green);color:white;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.25);display:none;}
[data-lang="ur"] .toast{right:18px;}[data-lang="en"] .toast{left:18px;}
.empty{text-align:center;padding:28px;color:var(--subtext);font-size:13px;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.ov.open{display:flex;}
.modal{background:var(--card);border-radius:16px;padding:22px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.wa-tpl{background:var(--gp);border:1px solid var(--border);border-radius:10px;padding:11px;font-size:12px;line-height:2;color:var(--text);margin:8px 0;white-space:pre-line;}
.btn-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingPage">
  <div class="loading-box">
    <div class="loading-logo">🕌</div>
    <div class="loading-text" id="loadText">دارالعلوم تلوجہ</div>
    <div class="loading-sub" id="loadSub">لوڈ ہو رہا ہے...</div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <div style="display:flex;justify-content:center;gap:8px;margin-bottom:14px;">
      <button class="tb-btn" style="background:var(--green);color:white;border-radius:7px;padding:4px 12px;" onclick="setLang('ur')">اردو</button>
      <button class="tb-btn" style="background:var(--blue);color:white;border-radius:7px;padding:4px 12px;" onclick="setLang('en')">English</button>
      <label class="toggle" title="Dark Mode" style="margin-right:4px">
        <input type="checkbox" id="themeToggleLogin" onchange="setTheme(this.checked)">
        <span class="slider"></span>
      </label>
      <span style="font-size:18px" id="themeIconLogin">🌙</span>
    </div>
    <div class="login-logo">🕌</div>
    <div class="login-title" id="lt1">دارالعلوم اسلامیہ عربیہ تلوجہ</div>
    <div class="login-sub" id="lt2">Darul Uloom Islamia Arabia Taloja</div>
    <input type="text" id="lid" placeholder="آئی ڈی" />
    <input type="password" id="lpass" placeholder="پاس ورڈ" onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="login-btn" onclick="doLogin()" id="loginBtn">داخل ہوں ←</button>
    <div class="login-err" id="lerr">آئی ڈی یا پاس ورڈ غلط ہے</div>
    <div style="font-size:11px;color:#888;margin-top:8px"><span class="sync-dot online" id="syncDot"></span> <span id="syncTxt">Firebase منسلک</span></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-title" id="appTitle">🕌 دارالعلوم تلوجہ</div>
    <div class="topbar-right">
      <span class="sync-dot online" id="appSyncDot"></span>
      <span id="uLabel" style="font-size:11px;opacity:.85"></span>
      <div class="toggle-wrap">
        <span id="themeIconApp">🌙</span>
        <label class="toggle"><input type="checkbox" id="themeToggleApp" onchange="setTheme(this.checked)"><span class="slider"></span></label>
      </div>
      <button class="tb-btn" onclick="setLang('ur')" id="btnUr">اردو</button>
      <button class="tb-btn" onclick="setLang('en')" id="btnEn">EN</button>
      <button class="tb-btn" onclick="doLogout()" id="logoutBtn">خروج</button>
    </div>
  </div>
  <div class="main">
    <div class="tabs" id="tabsBar"></div>
    <div id="tab-dashboard" style="display:none">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="card"><div class="card-title" id="ttRecent">📋 حالیہ سرگرمی</div><div id="recentLog"></div></div>
    </div>
    <div id="tab-classes" style="display:none">
      <div class="card">
        <div class="card-title" id="ttAddClass">➕ نئی کلاس</div>
        <div class="form-row">
          <div class="fg"><label id="lCat">کیٹیگری</label>
            <select id="ncCat">
              <option value="حفظ">حفظ / Hifz</option>
              <option value="دینیات">دینیات / Diniyat</option>
              <option value="عالمیت">عالمیت / Aalimiyat</option>
            </select></div>
          <div class="fg"><label id="lClsName">درجہ کا نام</label><input id="ncName" /></div>
          <div class="fg"><label id="lTeacher">استاد</label><input id="ncTeacher" /></div>
        </div>
        <div class="form-row">
          <div class="fg"><label id="lClsId">لاگ ان آئی ڈی</label><input id="ncId" /></div>
          <div class="fg"><label id="lClsPass">پاس ورڈ</label><input id="ncPass" /></div>
        </div>
        <div class="btn-wrap">
          <button class="btn btn-green" onclick="addClass()" id="btnAddCls">➕ شامل کریں</button>
          <button class="btn btn-blue" onclick="document.getElementById('clsImportFile').click()" id="btnImportCls">📥 Excel Import</button>
          <input type="file" id="clsImportFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="importClasses(this)">
          <button class="btn btn-gold" onclick="exportClassesExcel()" id="btnExportCls">📤 Excel Export</button>
          <button class="btn btn-gold" onclick="downloadClassTemplate()" id="btnTplCls">📋 Template</button>
        </div>
      </div>
      <div id="classesDisplay"></div>
    </div>
    <div id="tab-students" style="display:none">
      <div class="card">
        <div class="card-title" id="ttAddStu">➕ نیا طالب علم</div>
        <div class="form-row">
          <div class="fg"><label id="lSCat">کیٹیگری</label>
            <select id="sCat" onchange="fillClassDrop('sCls','sCat')">
              <option value="حفظ">حفظ / Hifz</option><option value="دینیات">دینیات / Diniyat</option><option value="عالمیت">عالمیت / Aalimiyat</option>
            </select></div>
          <div class="fg"><label id="lSCls">درجہ</label><select id="sCls"></select></div>
        </div>
        <div class="form-row">
          <div class="fg"><label id="lSName">نام (مثلاً: محمد زید بن محمد اسلم)</label><input id="sName" /></div>
          <div class="fg"><label id="lSPhone">واٹس ایپ</label><input id="sPhone" placeholder="923001234567" /></div>
        </div>
        <div class="btn-wrap">
          <button class="btn btn-green" onclick="addStudent()" id="btnAddStu">➕ شامل کریں</button>
          <button class="btn btn-blue" onclick="document.getElementById('stuImportFile').click()" id="btnImportStu">📥 Excel Import</button>
          <input type="file" id="stuImportFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="importStudents(this)">
          <button class="btn btn-gold" onclick="exportStudentsExcel()" id="btnExportStu">📤 Excel Export</button>
          <button class="btn btn-gold" onclick="downloadStudentTemplate()" id="btnTplStu">📋 Template</button>
        </div>
      </div>
      <div class="card" style="padding:10px 14px">
        <div class="form-row" style="margin:0;align-items:flex-end">
          <div class="fg"><label id="lFCat">کیٹیگری</label>
            <select id="fCat" onchange="renderStudents()"><option value="">— سب —</option>
              <option value="حفظ">حفظ</option><option value="دینیات">دینیات</option><option value="عالمیت">عالمیت</option></select></div>
          <div class="fg"><label id="lFCls">درجہ</label><select id="fCls" onchange="renderStudents()"><option value="">— سب —</option></select></div>
          <div class="fg"><label id="lSearch">تلاش</label><input id="fSearch" oninput="renderStudents()" /></div>
        </div>
      </div>
      <div class="card"><div class="card-title" id="ttStuList">👨‍🎓 طلبہ</div><div id="studTable"></div></div>
    </div>
    <div id="tab-accounts" style="display:none">
      <div class="card"><div class="card-title" id="ttAcc">🔑 اکاؤنٹس</div><div id="accTable"></div></div>
    </div>
    <div id="tab-whatsapp" style="display:none">
      <div class="card">
        <div class="card-title" id="ttWA">📱 واٹس ایپ</div>
        <div class="form-row">
          <div class="fg"><label id="lWCat">کیٹیگری</label>
            <select id="wCat" onchange="fillClassDrop('wCls','wCat',true)">
              <option value="">— سب —</option><option value="حفظ">حفظ</option><option value="دینیات">دینیات</option><option value="عالمیت">عالمیت</option></select></div>
          <div class="fg"><label id="lWCls">درجہ</label><select id="wCls"><option value="">— سب —</option></select></div>
        </div>
        <div class="fg" style="margin-bottom:10px"><label id="lWMsg">میسج</label>
          <textarea id="wMsg" rows="4">السلام علیکم! {نام} کی نمازوں کی ہفتہ وار رپورٹ ملاحظہ فرمائیں۔ جزاکم اللہ خیرا — دارالعلوم تلوجہ</textarea></div>
        <div class="btn-wrap">
          <button class="btn btn-green" onclick="previewWa()" id="btnWAPreview">👁️ پیش نظارہ</button>
          <button class="btn btn-gold" onclick="exportWaCsv()" id="btnWAcsv">📥 CSV</button>
        </div>
      </div>
      <div class="card" id="waPreview" style="display:none">
        <div class="card-title" id="ttWAPreview">📤 پیش نظارہ</div><div id="waList"></div>
      </div>
    </div>
    <div id="tab-attendance" style="display:none">
      <div class="card">
        <div class="card-title" id="ttAtt">🕌 نماز حاضری</div>
        <div class="form-row">
          <div class="fg"><label id="lAttStu">طالب علم</label><select id="attStu" onchange="loadAttendance()"><option value="">— منتخب کریں —</option></select></div>
          <div class="fg"><label id="lAttMonth">مہینہ</label><select id="attMonth" onchange="loadAttendance()"></select></div>
          <div class="fg"><label id="lAttYear">سال</label><select id="attYear" onchange="loadAttendance()"></select></div>
        </div>
        <button class="btn btn-gold btn-sm" onclick="exportAttPDF()" id="btnAttPDF">📄 PDF Export</button>
      </div>
      <div id="attChart"></div>
    </div>
    <div id="tab-mystudents" style="display:none">
      <div class="card">
        <div class="card-title" id="ttMyStu">👨‍🎓 میرے طلبہ</div>
        <div class="btn-wrap" style="margin-bottom:10px">
          <button class="btn btn-gold btn-sm" onclick="exportMyStudentsPDF()" id="btnMyStuPDF">📄 PDF</button>
          <button class="btn btn-green btn-sm" onclick="exportMyStudentsExcel()" id="btnMyStuXls">📤 Excel</button>
        </div>
        <div id="myStudTable"></div>
      </div>
    </div>
  </div>
</div>

<div class="ov" id="ov"><div class="modal" id="modalBox">
  <div style="font-size:15px;font-weight:700;color:var(--green);margin-bottom:14px" id="mTitle"></div>
  <div id="mBody"></div>

window.setLang = function(l){
  LANG = l; localStorage.setItem('du_lang',l);
  const html = document.documentElement;
  html.setAttribute('data-lang',l);
  html.setAttribute('lang',l);
  html.setAttribute('dir',l==='ur'?'rtl':'ltr');
  applyTranslations();
  if(CU) buildTabs();
};

window.setTheme = function(dark){
  THEME = dark?'dark':'light';
  localStorage.setItem('du_theme',THEME);
  document.documentElement.setAttribute('data-theme',THEME);
  const icon = dark?'☀️':'🌙';
  ['themeIconLogin','themeIconApp'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=icon;});
  ['themeToggleLogin','themeToggleApp'].forEach(id=>{const el=document.getElementById(id);if(el)el.checked=dark;});
};

function applyTranslations(){
  const t = T[LANG];
  const ids = ['appTitle','loadText','loadSub','loginBtn','syncTxt','logoutBtn',
    'ttRecent','ttAddClass','ttAddStu','ttAcc','ttWA','ttWAPreview','ttAtt','ttMyStu','ttStuList',
    'lCat','lClsName','lTeacher','lClsId','lClsPass','lSCat','lSCls','lSName','lSPhone',
    'lFCat','lFCls','lSearch','lWCat','lWCls','lWMsg','lAttStu','lAttMonth','lAttYear',
    'btnAddCls','btnImportCls','btnExportCls','btnTplCls','btnAddStu','btnImportStu','btnExportStu','btnTplStu',
    'btnWAPreview','btnWAcsv','btnAttPDF','btnMyStuPDF','btnMyStuXls','btnClose'];
  ids.forEach(id=>{const el=document.getElementById(id);if(el&&t[id])el.textContent=t[id];});
  const loginBtn=document.getElementById('loginBtn');if(loginBtn)loginBtn.textContent=t.loginBtn;
  const lid=document.getElementById('lid');if(lid)lid.placeholder=LANG==='ur'?'آئی ڈی':'ID';
  const lpass=document.getElementById('lpass');if(lpass)lpass.placeholder=LANG==='ur'?'پاس ورڈ':'Password';
}

function t(key,...args){
  let s = T[LANG][key]||T['ur'][key]||key;
  args.forEach((v,i)=>s=s.replace(`{${['n','m','x'][i]}}`,v));
  return s;
}

function setSyncDot(s){['syncDot','appSyncDot'].forEach(id=>{const el=document.getElementById(id);if(el)el.className='sync-dot '+s;});}

async function loadFromFirebase(){
  try{const snap=await getDoc(doc(db,'darululoom','main'));
    if(snap.exists()){DB=snap.data();if(!DB.attendance)DB.attendance={};}
    else{await setDoc(doc(db,'darululoom','main'),DEFAULT_DB);}
    setSyncDot('online');
  }catch(e){const local=localStorage.getItem('du_db4');if(local)DB=JSON.parse(local);setSyncDot('offline');}
}

async function saveToFirebase(){
  setSyncDot('syncing');
  try{await setDoc(doc(db,'darululoom','main'),DB);localStorage.setItem('du_db4',JSON.stringify(DB));setSyncDot('online');}
  catch(e){localStorage.setItem('du_db4',JSON.stringify(DB));setSyncDot('offline');toast(t('offline'),'red');}
}

function startRealtime(){
  onSnapshot(doc(db,'darululoom','main'),(snap)=>{
    if(snap.exists()&&CU){DB=snap.data();if(!DB.attendance)DB.attendance={};setSyncDot('online');const ab=document.querySelector('.tab-btn.active');if(ab)ab.click();}
  },()=>setSyncDot('offline'));
}

async function save(){localStorage.setItem('du_db4',JSON.stringify(DB));await saveToFirebase();}
function logAct(msg){if(!DB.log)DB.log=[];DB.log.push({t:new Date().toLocaleString(),m:msg});if(DB.log.length>60)DB.log=DB.log.slice(-60);}
function toast(m,c='green'){const el=document.getElementById('toast');el.textContent=m;el.style.background=c==='red'?'#b52a2a':'#1a5c2e';el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',2800);}

// LOGIN
window.doLogin=function(){
  const id=document.getElementById('lid').value.trim(),pass=document.getElementById('lpass').value;
  const acc=DB.accounts.find(a=>a.id===id&&a.pass===pass);
  if(!acc){document.getElementById('lerr').style.display='block';document.getElementById('lerr').textContent=t('loginErr');return;}
  CU=acc;
  document.getElementById('loginPage').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('uLabel').textContent=acc.name+' ('+(acc.role==='admin'?t('admin'):t('teacher'))+')';
  document.getElementById('lerr').style.display='none';
  startRealtime();buildTabs();applyTranslations();
};

window.doLogout=function(){CU=null;document.getElementById('loginPage').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('lid').value='';document.getElementById('lpass').value='';};

function buildTabs(){
  const bar=document.getElementById('tabsBar');
  const tabs=CU.role==='admin'
    ?[{id:'dashboard',k:'tabDash'},{id:'classes',k:'tabCls'},{id:'students',k:'tabStu'},{id:'accounts',k:'tabAcc'},{id:'whatsapp',k:'tabWA'}]
    :[{id:'mystudents',k:'tabMyS'},{id:'attendance',k:'tabAtt'}];
  bar.innerHTML=tabs.map((tb,i)=>`<button class="tab-btn${i===0?' active':''}" onclick="showTab('${tb.id}',this)">${t(tb.k)}</button>`).join('');
  showTab(tabs[0].id,bar.firstChild);
}

window.showTab=function(name,btn){
  document.querySelectorAll('[id^="tab-"]').forEach(el=>el.style.display='none');
  const el=document.getElementById('tab-'+name);if(el)el.style.display='block';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(name==='dashboard')renderDashboard();
  if(name==='classes')renderClasses();
  if(name==='students'){fillClassDrop('sCls','sCat');renderStudents();}
  if(name==='accounts')renderAccounts();
  if(name==='attendance')initAttendance();
  if(name==='mystudents')renderMyStudents();
};

function renderDashboard(){
  const cats=['حفظ','دینیات','عالمیت'],catEn=['Hifz','Diniyat','Aalimiyat'];
  // top summary
  let h=`
    <div class="stat-box" style="border:2px solid var(--green)">
      <div class="stat-num">${DB.classes.length}</div>
      <div class="stat-label">${LANG==='ur'?'مجموعی درجات':'Total Classes'}</div>
    </div>
    <div class="stat-box" style="border:2px solid var(--gold)">
      <div class="stat-num">${DB.students.length}</div>
      <div class="stat-label">${LANG==='ur'?'مجموعی طلبہ':'Total Students'}</div>
    </div>`;
  // per category
  cats.forEach((c,i)=>{
    const clsN=DB.classes.filter(x=>x.cat===c).length;
    const stuN=DB.students.filter(x=>x.cat===c).length;
    const label=LANG==='en'?catEn[i]:c;
    h+=`<div class="stat-box" style="border:1px solid var(--border);padding:14px 10px">
      <div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:6px">${label}</div>
      <div style="display:flex;justify-content:space-around;gap:8px">
        <div style="text-align:center">
          <div class="stat-num" style="font-size:22px">${clsN}</div>
          <div class="stat-label">${LANG==='ur'?'درجات':'Classes'}</div>
        </div>
        <div style="width:1px;background:var(--border)"></div>
        <div style="text-align:center">
          <div class="stat-num" style="font-size:22px;color:var(--gold)">${stuN}</div>
          <div class="stat-label">${LANG==='ur'?'طلبہ':'Students'}</div>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('statsGrid').innerHTML=h;
  const recent=(DB.log||[]).slice(-8).reverse();
  document.getElementById('recentLog').innerHTML=recent.length
    ?`<table><thead><tr><th>${t('thTime')}</th><th>${t('thActivity')}</th></tr></thead><tbody>${recent.map(l=>`<tr><td>${l.t}</td><td>${l.m}</td></tr>`).join('')}</tbody></table>`
    :`<div class="empty">${t('noActivity')}</div>`;
}

window.addClass=async function(){
  const cat=document.getElementById('ncCat').value,name=document.getElementById('ncName').value.trim();
  const teacher=document.getElementById('ncTeacher').value.trim(),cid=document.getElementById('ncId').value.trim(),cpass=document.getElementById('ncPass').value.trim();
  if(!name){toast(t('enterName'),'red');return;}if(!cid||!cpass){toast(t('enterIdPass'),'red');return;}
  if(DB.classes.find(c=>c.cat===cat&&c.name===name)){toast(t('alreadyExists'),'red');return;}
  if(DB.accounts.find(a=>a.id===cid)){toast(t('alreadyExists'),'red');return;}
  const id='cls_'+Date.now();
  DB.classes.push({id,cat,name,teacher});
  DB.accounts.push({id:cid,pass:cpass,name:teacher||name,role:'teacher',classId:id});
  logAct(`New class: ${cat}—${name}`);await save();
  ['ncName','ncTeacher','ncId','ncPass'].forEach(x=>document.getElementById(x).value='');
  renderClasses();toast(t('addedToast'));
};

window.deleteClass=async function(id){
  if(!confirm(t('confirmDeleteClass')))return;
  const cls=DB.classes.find(c=>c.id===id);
  DB.classes=DB.classes.filter(c=>c.id!==id);DB.students=DB.students.filter(s=>s.classId!==id);DB.accounts=DB.accounts.filter(a=>a.classId!==id);
  logAct(`Deleted class: ${cls?.name}`);await save();renderClasses();toast(t('deletedToast'));
};

function renderClasses(){
  const cats=['حفظ','دینیات','عالمیت'],catEn=['Hifz','Diniyat','Aalimiyat'];let h='';
  cats.forEach((cat,ci)=>{
    const cls=DB.classes.filter(c=>c.cat===cat);const catLabel=LANG==='en'?catEn[ci]:cat;
    h+=`<div class="section-head">📚 ${catLabel} (${cls.length})</div>`;
    if(!cls.length){h+=`<div class="empty">${t('noClass')}</div>`;}
    else{h+=`<div class="class-grid">`+cls.map(c=>{
      const acc=DB.accounts.find(a=>a.classId===c.id);const cnt=DB.students.filter(s=>s.classId===c.id).length;
      return`<div class="class-card"><button class="cc-del" onclick="deleteClass('${c.id}')">✕</button>
        <div class="cc-name">${c.name}</div>
        <div class="cc-info">${t('clsTeacher')}: ${c.teacher||'—'}</div>
        <div class="cc-info">${t('clsStudents')}: ${cnt}</div>
        <div class="cc-info" style="margin-top:4px;background:var(--gp);padding:3px 6px;border-radius:4px;font-size:10px">ID: <b>${acc?.id||'—'}</b> | Pass: <b>${acc?.pass||'—'}</b></div>
      </div>`;}).join('')+'</div>';}
  });
  document.getElementById('classesDisplay').innerHTML=h;
}

window.importClasses=async function(input){
  const file=input.files[0];if(!file)return;
  const data=await file.arrayBuffer();const wb=XLSX.read(data);const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{defval:''});let added=0;
  const gv=(r,...keys)=>{for(const k of Object.keys(r)){for(const kw of keys){if(k.includes(kw))return String(r[k]||'').trim();}}return'';};
  for(const r of rows){
    let cat=gv(r,'کیٹیگری','Category','cat');
    // normalize category spelling
    if(cat.includes('عالم')||cat.toLowerCase().includes('aalim')||cat.toLowerCase().includes('alim'))cat='عالمیت';
    else if(cat.includes('حفظ')||cat.toLowerCase().includes('hifz')||cat.toLowerCase().includes('hafiz'))cat='حفظ';
    else if(cat.includes('دین')||cat.toLowerCase().includes('dini')||cat.toLowerCase().includes('din'))cat='دینیات';
    const name=gv(r,'درجہ نام','Class Name','name');
    const teacher=gv(r,'استاد','Teacher','teacher');
    const cid=gv(r,'آئی ڈی','ID','id','Id');
    const cpass=gv(r,'پاسورڈ','Password','pass','Pass');
    if(!name||!cid||!cpass)continue;
    if(DB.classes.find(c=>c.cat===cat&&c.name===name))continue;
    if(DB.accounts.find(a=>a.id===cid))continue;
    const id='cls_'+Date.now()+'_'+added;
    DB.classes.push({id,cat,name,teacher});
    DB.accounts.push({id:cid,pass:cpass,name:teacher||name,role:'teacher',classId:id});added++;
  }
  logAct(`${added} classes imported`);await save();renderClasses();toast(`${added} ${t('addedToast')}`);input.value='';
};

window.addStudent=async function(){
  const cat=document.getElementById('sCat').value,classId=document.getElementById('sCls').value;
  const name=document.getElementById('sName').value.trim(),phone=document.getElementById('sPhone').value.trim();
  if(!name){toast(t('enterName'),'red');return;}if(!classId){toast(t('needClass'),'red');return;}
  const cls=DB.classes.find(c=>c.id===classId);
  DB.students.push({id:'s'+Date.now(),cat,classId,className:cls?.name,name,phone});
  logAct(`New student: ${name}`);await save();
  ['sName','sPhone'].forEach(x=>document.getElementById(x).value='');
  renderStudents();toast(t('addedToast'));
};

function renderStudents(){
  const cat=document.getElementById('fCat')?.value||'',classId=document.getElementById('fCls')?.value||'';
  const search=(document.getElementById('fSearch')?.value||'').toLowerCase();
  const fc=document.getElementById('fCls');
  if(fc){const prev=fc.value;const cls=cat?DB.classes.filter(c=>c.cat===cat):DB.classes;
    fc.innerHTML=`<option value="">— ${LANG==='ur'?'سب':'All'} —</option>`+cls.map(c=>`<option value="${c.id}" ${c.id===prev?'selected':''}>${c.cat}—${c.name}</option>`).join('');}
  let stus=DB.students;
  if(cat)stus=stus.filter(s=>s.cat===cat);if(classId)stus=stus.filter(s=>s.classId===classId);
  if(search)stus=stus.filter(s=>s.name.toLowerCase().includes(search));
  const cc={حفظ:'bg',دینیات:'bb',عالمیت:'br'};
  document.getElementById('studTable').innerHTML=stus.length
    ?`<table><thead><tr><th>#</th><th>${t('thName')}</th><th>${t('thPhone')}</th><th>${t('thCat')}</th><th>${t('thClass')}</th><th>${t('thPDF')}</th><th>${t('thDelete')}</th></tr></thead>

window.importStudents=async function(input){

  const rows=XLSX.utils.sheet_to_json(ws,{defval:''});let added=0;
  const gv=(r,...keys)=>{for(const k of Object.keys(r)){for(const kw of keys){if(k.includes(kw))return String(r[k]||'').trim();}}return'';};
  for(const r of rows){
    const name=gv(r,'نام','Name','name');
    const phone=gv(r,'واٹس ایپ','WhatsApp','phone','Phone');
    const clsName=gv(r,'درجہ','Class','class');
    let cat=gv(r,'کیٹیگری','Category','cat');

window.exportWaCsv=function(){
  const prev=document.getElementById('waPreview');const stus=prev._s||DB.students.filter(s=>s.phone);const tpl=prev._t||document.getElementById('wMsg').value;
  const rows=[['Name','Phone','Category','Class','Message']];

function initAttendance(){
  const stus=CU.classId?DB.students.filter(s=>s.classId===CU.classId):DB.students;
  const sel=document.getElementById('attStu');
  sel.innerHTML=`<option value="">— ${LANG==='ur'?'منتخب کریں':'Select'} —</option>`+stus.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  const mSel=document.getElementById('attMonth'),MONTHS=T[LANG].MONTHS;
  mSel.innerHTML=MONTHS.map((m,i)=>`<option value="${i}">${m}</option>`).join('');
  mSel.value=new Date().getMonth()+12;
  const yr=new Date().getFullYear();
  document.getElementById('attYear').innerHTML=[yr-1,yr,yr+1].map(y=>`<option value="${y}"${y===yr?' selected':''}>${y}</option>`).join('');
  document.getElementById('attChart').innerHTML='';
}

window.loadAttendance=function(){
  const stuId=document.getElementById('attStu').value;if(!stuId){document.getElementById('attChart').innerHTML='';return;}
  const stu=DB.students.find(s=>s.id===stuId);if(!stu)return;
  const month=document.getElementById('attMonth').value,year=document.getElementById('attYear').value;
  const key=`${stuId}_${year}_${month}`;if(!DB.attendance)DB.attendance={};
  const att=DB.attendance[key]||{};const days=Array.from({length:31},(_,i)=>i+1);
  const MONTHS=T[LANG].MONTHS,NAMAZ=T[LANG].NAMAZ;
  let th=`<th style="min-width:110px">${LANG==='ur'?'نماز':'Prayer'}</th>`+days.map(d=>`<th>${d}</th>`).join('');
  let rows='';let lastGroup='';
  NAMAZ.forEach(row=>{
    if(row.group&&row.group!==lastGroup){rows+=`<tr><td class="group-header" colspan="${days.length+1}">${row.group}</td></tr>`;lastGroup=row.group;}
    else if(!row.group){lastGroup='';}
    let cells=days.map(d=>{const val=att[row.key]?att[row.key][d]:undefined;
      const sym=val===true?'✅':val===false?'❌':'◯';const cls=val===true?'c-yes':val===false?'c-no':'c-empty';
      return`<td><span class="check-cell ${cls}" onclick="toggleAtt('${key}','${row.key}',${d})">${sym}</span></td>`;}).join('');
    rows+=`<tr><td class="${row.group?'sub-label':'row-label'}">${row.label}</td>${cells}</tr>`;
  });
  document.getElementById('attChart').innerHTML=`
    <div class="namaz-header">${LANG==='ur'?'نماز حاضری':'Prayer Attendance'} — ${stu.name} — ${MONTHS[month]} ${year}</div>
    <div class="namaz-subheader"><span>${LANG==='ur'?'درجہ':'Class'}: <b>${stu.className||stu.cat}</b></span>
      <span>✅=${LANG==='ur'?'پڑھی':'Yes'} ❌=${LANG==='ur'?'نہیں':'No'} ◯=${LANG==='ur'?'درج نہیں':'Blank'}</span>
      <span><button class="btn btn-green btn-sm" onclick="saveAtt('${key}')">${LANG==='ur'?'💾 محفوظ':'💾 Save'}</button></span></div>
    <div class="namaz-wrap"><table class="namaz-table"><thead><tr>${th}</tr></thead><tbody>${rows}</tbody></table></div>
    <div style="margin-top:8px;font-size:11px;color:var(--subtext)">${t('signTeacher')}: .................. &nbsp; ${t('signParent')}: ..................</div>`;
};

window.toggleAtt=async function(key,rowKey,day){
  if(!DB.attendance)DB.attendance={};if(!DB.attendance[key])DB.attendance[key]={};if(!DB.attendance[key][rowKey])DB.attendance[key][rowKey]={};
  const cur=DB.attendance[key][rowKey][day];
  DB.attendance[key][rowKey][day]=cur===undefined?true:cur===true?false:undefined;
  if(DB.attendance[key][rowKey][day]===undefined)delete DB.attendance[key][rowKey][day];
  await save();loadAttendance();
};

    td{padding:7px;border-bottom:1px solid #ddd;text-align:${LANG==='en'?'left':'right'};}@media print{button{display:none}}</style></head><body>
    <h2 style="color:#1a5c2e">🕌 Darul Uloom Taloja — ${cls?cls.cat+'—'+cls.name:'Students'}</h2>
    <table><thead><tr><th>#</th><th>${t('thName')}</th><th>${t('thPhone')}</th></tr></thead>
    <tbody>${stus.map((s,i)=>`<tr><td>${i+1}</td><td>${s.name}</td><td>${s.phone||'—'}</td></tr>`).join('')}</tbody></table>
    <button onclick="window.print()" style="margin-top:16px;padding:10px 20px;background:#1a5c2e;color:white;border:none;border-radius:8px;cursor:pointer;">${t('printBtn')}</button>
    </body></html>`);w.document.close();
};

window.exportMyStudentsExcel=function(){
  const stus=CU.classId?DB.students.filter(s=>s.classId===CU.classId):[];
  const rows=stus.map(s=>({'نام / Name':s.name,'واٹس ایپ / WhatsApp':s.phone||'','کیٹیگری / Category':s.cat,'درجہ / Class':s.className||''}));
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Students');
  XLSX.writeFile(wb,'my_students.xlsx');toast(t('excelReady'));
};

window.goToAtt=function(stuId){
  showTab('attendance',null);
  setTimeout(()=>{document.getElementById('attStu').value=stuId;loadAttendance();
    document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.toggle('active',b.textContent.includes(LANG==='ur'?'نماز':'Prayer'));});},100);
};

window.closeModal=function(){document.getElementById('ov').classList.remove('open');};

async function init(){
  // Apply saved lang/theme
  setLang(LANG);setTheme(THEME==='dark');
  await loadFromFirebase();
  document.getElementById('loadingPage').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  applyTranslations();
}
init();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
